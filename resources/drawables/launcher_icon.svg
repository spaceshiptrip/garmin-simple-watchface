<svg xmlns="http://www.w3.org/2000/svg" width="70" height="70" viewBox="0 0 70 70">
  <circle cx="35" cy="35" r="35" fill="#000000"/>
  <circle cx="35" cy="35" r="30" fill="none" stroke="#ffffff" stroke-width="2"/>
  <!-- hour hand -->
  <line x1="35" y1="35" x2="35" y2="16" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- minute hand -->
